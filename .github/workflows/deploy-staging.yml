name: Deploy til Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy til Hetzner staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          key_format: base64
          script: |
            set -e
            cd /opt/hotel-platform-staging
            git pull origin dev
            docker compose -f docker-compose.staging.yml build staging-admin
            docker compose -f docker-compose.staging.yml up -d
            echo "✓ Staging opdateret!"
